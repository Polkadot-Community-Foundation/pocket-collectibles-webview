name: Deploy to Polkadot

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip-cache:
        description: "Skip deployment cache and force redeploy"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Hard rule: PCF CI is Summit-only. Fail the build if any Paseo reference
      # leaks into the shipped bundle (case-insensitive, binary-safe grep).
      - name: Assert bundle is Paseo-free
        run: |
          if grep -rIil 'paseo' dist; then echo "::error::Paseo reference in built bundle"; exit 1; fi
          echo "OK: no Paseo in bundle"

      - uses: actions/upload-artifact@v4
        with:
          name: collectibles-webview-build
          path: dist
          retention-days: 1

  # Production (push to main / manual) publishes collectibles-webview.dot to the
  # Summit network only. PR previews are intentionally NOT deployed: each preview
  # label is a fresh DotNS registration on Summit (storage deposit + ~14d Bulletin
  # expiry + PoP gate), so previews stay off Summit and `build` above is the PR gate.
  #
  # skip-cache: true forces every push to redeploy (the reusable workflow keys its
  # cache on build-content hash only, so unchanged content would otherwise skip).
  #
  # direct-signer: true — on Summit the default pool-mode storage accounts come from
  # a public phrase and are NOT Bulletin-authorized; only the DOTNS_MNEMONIC account
  # is, so it must sign the storage txs itself.
  #
  # publish: false — Summit's DotNS deployment has no Publisher registry.
  deploy-production:
    needs: build
    name: Deploy Production (Summit)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: Polkadot-Community-Foundation/polkadot-app-deploy/.github/workflows/deploy.yml@v0.12.0
    with:
      artifact-name: collectibles-webview-build
      dotns-domain: collectibles-webview.dot
      env: paseo-next
      gateway: dot.li
      direct-signer: true
      publish: false
      skip-cache: true
      max-retries: 10
      # v0.11.2 reusable installs the PCF-scoped @polkadot-community-foundation
      # package by default; v0.11.0 hardcoded @parity (wrong build for Summit).
      polkadot-app-deploy-version: "0.12.0"
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
